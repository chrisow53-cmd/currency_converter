<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter App</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css?family=Poppins:100,200,300,400,500,600,700,800,900" rel="stylesheet" />
</head>
<body>
    <div class="container">
        <h1>Currency Converter</h1>
        <form id="converter-form">
            <div class="form-group">
                <label for="amount">Amount</label>
                <input type="number" id="amount" placeholder="Enter Amount" required>
            </div>

            <div class="form-group">
                <label for="from-currency">From</label>
                <input type="text" id="from-currency" list="list-from" placeholder="Type to search (e.g. USD)" required>
            </div>

            <div class="swap-container">
                <button type="button" id="swap-btn" title="Swap Currencies">
                    ⇄
                </button>
            </div>

            <div class="form-group">
                <label for="to-currency">To</label>
                <input type="text" id="to-currency" list="list-to" placeholder="Type to search (e.g. SGD)" required>
            </div>

            <button type="submit">Convert</button>
        </form>
        <div id="result"></div>
    </div>

    <datalist id="list-from"></datalist>
    <datalist id="list-to"></datalist>

    <script src="script.js"></script>
</body>
</html>
